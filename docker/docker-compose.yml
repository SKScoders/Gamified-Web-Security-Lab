services:
  lab-level1:
    build:
      context: ../labs
      dockerfile: Dockerfile
      args:
        LAB: level1
        PORT: "3001"
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${LAB_JWT_SECRET_1:-solstice_jwt_secret_2024}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

